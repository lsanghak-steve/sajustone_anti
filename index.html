<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>사주 기반 천연석 추천</title>
    <!-- 디자인(CSS) 파일 연결 -->
    <link rel="stylesheet" href="style.css">
    <!-- 구글 폰트 연결: 깔끔하고 읽기 쉬운 'Noto Sans KR' 사용 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <!-- 웹사이트 제목 영역 -->
        <header>
            <h1>나의 기운을 채워주는 천연석</h1>
            <p>생년월일을 입력하면 사주를 분석해 필요한 원석을 추천해 드립니다.</p>
        </header>

        <!-- 정보 입력 폼 -->
        <main>
            <form id="saju-form" class="input-form">
                <div class="form-group">
                    <label for="birth-date">생년월일</label>
                    <input type="date" id="birth-date" required>
                </div>
                <!-- 태어난 시간은 모를 수 있으므로 선택 사항으로 둠 -->
                <div class="form-group">
                    <label for="birth-time">태어난 시간 (선택)</label>
                    <input type="time" id="birth-time">
                </div>
                <button type="submit" class="submit-btn">나의 천연석 찾기</button>
            </form>

            <!-- 결과가 표시될 화면 (처음에는 숨겨져 있음) -->
            <div id="result-section" class="result-section hidden">
                <h2>추천 천연석 결과</h2>
                <div class="stone-card">
                    <!-- 이미지가 들어갈 영역 -->
                    <div class="stone-image-placeholder" id="stone-image"></div>
                    <h3 id="stone-name">원석 이름</h3>
                    <p id="stone-description">원석에 대한 설명이 여기에 나옵니다.</p>
                </div>
                <button id="reset-btn" class="reset-btn">다시 하기</button>
            </div>
        </main>
    </div>
    
    <!-- 동작(JavaScript) 파일 연결 (다음 단계에서 생성 예정) -->
    <script src="script.js"></script>
</body>
</html>
